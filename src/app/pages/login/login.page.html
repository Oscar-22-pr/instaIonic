<ion-header><ion-toolbar><ion-title>Mini Instagram</ion-title></ion-toolbar></ion-header>
<ion-content class="ion-padding">
  <ion-segment [(ngModel)]="isRegister">
    <ion-segment-button [value]="false"><ion-label>Ingresar</ion-label></ion-segment-button>
    <ion-segment-button [value]="true"><ion-label>Registrar</ion-label></ion-segment-button>
  </ion-segment>

  <div *ngIf="isRegister">
    <ion-item><ion-input label="Nombre" [(ngModel)]="name"></ion-input></ion-item>
    <ion-item><ion-input label="Usuario" [(ngModel)]="username"></ion-input></ion-item>
  </div>

  <ion-item><ion-input label="Email" [(ngModel)]="email"></ion-input></ion-item>
  <ion-item><ion-input label="Password" type="password" [(ngModel)]="password"></ion-input></ion-item>

  <ion-button expand="block" (click)="submit()">
    {{ isRegister ? 'Crear cuenta' : 'Entrar' }}
  </ion-button>

  <ion-text color="danger" *ngIf="error">{{ error }}</ion-text>
</ion-content>
